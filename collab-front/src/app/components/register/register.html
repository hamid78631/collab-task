<div class="register-card">

  <div class="register-logo">
    <h1>FlowBoard</h1>
    <p>Crée ton compte</p>
  </div>

  <form (ngSubmit)="onRegister()">

    <div class="form-group">
      <label>Nom</label>
      <input
        type="text"
        [(ngModel)]="name"
        name="name"
        required
        placeholder="Nom"
      />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        required
        placeholder="email@mail.com"
      />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="password-wrapper">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••••"
        />
        <button type="button" class="eye-btn" (click)="showPassword.set(!showPassword())" tabindex="-1">
          @if (showPassword()) {
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
              <line x1="3" y1="3" x2="17" y2="17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          } @else {
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          }
        </button>
      </div>
    </div>

    @if (errorMessage()) {
    <p class="error-msg">{{ errorMessage() }}</p>
    }

    <button type="submit" class="btn-submit" [disabled]="isLoading()">
      {{ isLoading() ? 'Création...' : 'Créer mon compte' }}
    </button>

  </form>

  <p class="register-footer">
    Déjà un compte ?
    <a routerLink="/login">Se connecter</a>
  </p>

</div>
