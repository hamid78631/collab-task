<div class="sec-hd">
  <div class="sec-title">
    Mes Boards
    <span class="sec-pill">{{ boards.length }}</span>
  </div>
  <div class="sec-actions">
    <div class="vtoggle">
      <button class="vb" [class.active]="viewMode === 'grid'" (click)="viewModeChange.emit('grid')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="vb" [class.active]="viewMode === 'list'" (click)="viewModeChange.emit('list')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="grid" [class.list-view]="viewMode === 'list'">

  @for (board of boards; track board.id) {
  <div class="bcard" [class.fav]="board.isFavorite"
       [style.--board-color]="board.backgroundColor || '#6366f1'">
    <div class="stripe"
         [style.background]="board.backgroundColor || null"
         [ngClass]="board.backgroundColor ? '' : 's' + ((board.id - 1) % 6 + 1)">
    </div>
    <div class="binner">
      <div class="bhead">
        <div class="bico" [innerHTML]="getIcon(board.id)"></div>
        <div class="bmeta">
          <div class="bname">{{ board.title }}</div>
        </div>
        <button class="fstar" (click)="toggleFav.emit(board.id)">
          <svg width="12" height="12" viewBox="0 0 24 24"
               [attr.fill]="board.isFavorite ? '#f59e0b' : 'none'"
               [attr.stroke]="board.isFavorite ? '#f59e0b' : 'currentColor'"
               stroke-width="2" stroke-linecap="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="bfoot">
      <div class="bactions">
        <button class="act-btn edit-btn" (click)="openEdit.emit(board)" title="Modifier">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="act-btn del-btn" (click)="openDelete.emit(board.id)" title="Supprimer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
        <button class="obtn" [routerLink]="['/board', board.id]">
          Ouvrir
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  }

  <div class="addcard" (click)="openModal.emit()">
    <div class="addcircle">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <div class="addlbl">Créer un board</div>
    <div class="addsub">Nouveau projet ou équipe</div>
  </div>

</div>
