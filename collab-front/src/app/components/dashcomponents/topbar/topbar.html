<header class="topbar">
  <span class="tb-title">Dashboard</span>
  <div class="tb-sep"></div>
  <span class="tb-date">{{ today | date:'EEEE d MMMM yyyy' : '' : 'fr' }}</span>
  <div class="tb-right">
    <div class="search" [class.focused]="searchFocused">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="color:var(--text-3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        placeholder="Rechercher..."
        [value]="searchTerm"
        (input)="searchTermChange.emit($any($event.target).value)"
        (focus)="searchFocusedChange.emit(true)"
        (blur)="searchFocusedChange.emit(false)"
      />
    </div>
    <select class="sort-sel"
            [value]="sortBy"
            (change)="sortByChange.emit($any($event.target).value)">
      <option value="title">Nom A–Z</option>
    </select>
    <div class="ico-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div class="ndot"></div>
    </div>
    <button class="btn-logout" (click)="logout()" title="Se déconnecter">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>
